


<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Página Simple</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
        }

        main {
            padding: 20px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #45a049;
        }

        footer {
            background-color: #222;
            color: white;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bienvenido a mi página</h1>
    </header>

    <main>
        <p>Esta es una página web muy sencilla hecha en HTML y CSS.</p>
        <button onclick="saludar()">Haz clic aquí</button>
    </main>

    <footer>
        <p>© 2026 - Mi Página Web</p>
    </footer>

    <script>
        function saludar() {
            alert("¡Hola! Gracias por visitar mi página 😎");
        }
    </script>

</body>
</html>
